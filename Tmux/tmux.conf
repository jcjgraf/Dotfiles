# Allow reloading of config
unbind r
bind r source-file ~/.config/tmux/tmux.conf

set -g mouse on

# Use vim like bindings for copy
set -g mode-keys vi

# Use  vim keybindings to navigate
# bind-key h select-pane  -L
# bind-key j select-pane  -D
# bind-key k select-pane  -U
# bind-key l select-pane  -R

bind-key -n C-h select-pane -L
bind-key -n C-j select-pane -D
bind-key -n C-k select-pane -U
bind-key -n C-l select-pane -R

# Increase scroll back history
set-option -g history-limit 50000

# bind '"' split-window -c "#{pane_current_path}"
# bind % split-window -h -c "#{pane_current_path}"
bind C new-window -c "#{pane_current_path}"

# Color
# set-option -g pane-active-border-style fg=blue
# set -g window-style 'fg=colour247,bg=colour236'
# set -g window-active-style 'fg=colour250,bg=black'
# set -g status-left '#P'
# set -g pane-active-border-style bg=yellow

## Plugins
set -g @plugin 'tmux-plugins/tpm'

set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Proper support of colors
# Goal: Script produces smooth color transition: https://gist.githubusercontent.com/lifepillar/09a44b8cf0f9397465614e622979107f/raw/24-bit-color.sh
set  -g default-terminal "tmux-256color"
set -ag terminal-overrides ",alacritty:RGB"




# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
# run '~/.tmux/plugins/tpm/tpm'
run '/usr/share/tmux-plugin-manager/tpm'
